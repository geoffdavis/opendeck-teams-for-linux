name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel a superseded review when the PR is pushed again.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  # Required: the action mints its GitHub token via OIDC.
  id-token: write
  # Lets the review read workflow run / CI results for context.
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Only review branches pushed to this repo; fork PRs can't read the
    # CLAUDE_CODE_OAUTH_TOKEN secret.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          # Claude Pro/Max subscription auth. Generate with `claude setup-token`
          # and store as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
