name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel a superseded review when the PR is pushed again.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  # Required: the action mints its GitHub token via OIDC.
  id-token: write
  # Lets the review read workflow run / CI results for context.
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Only review branches pushed to this repo; fork PRs can't read the
    # CLAUDE_CODE_OAUTH_TOKEN secret.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # The action fetches `main` to restore trusted config, so it needs the
      # repo checked out (a .git directory).
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          # Claude Pro/Max subscription auth. Generate with `claude setup-token`
          # and store as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Explicit review prompt (the action's documented pattern). It posts
          # via the action's native tools, which the plugin-skill approach did
          # not, so findings actually land on the PR.
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in the
            repository ${{ github.repository }}. The PR branch is already
            checked out in the working directory.

            Focus on correctness bugs, security issues, and regressions
            introduced by the diff; mention notable quality problems briefly and
            skip minor nits unless they matter. Be concise.

            Post your findings on GitHub only — do not return the review as a
            chat message:
            - Use `mcp__github_inline_comment__create_inline_comment` (with
              `confirmed: true`) for line-specific findings.
            - Use `gh pr comment` to post one short summary comment.
            If you find nothing worth flagging, post a brief summary saying so.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
