name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel a superseded review when the PR is pushed again.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  # Required: the action mints its GitHub token via OIDC.
  id-token: write
  # Lets the review read workflow run / CI results for context.
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Only review branches pushed to this repo; fork PRs can't read the
    # CLAUDE_CODE_OAUTH_TOKEN secret.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # The action fetches `main` to restore trusted config, so it needs the
      # repo checked out (a .git directory).
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          # Claude Pro/Max subscription auth. Generate with `claude setup-token`
          # and store as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # Grant the tools the review needs to actually post its findings;
          # without these the inline-comment calls are denied and nothing is
          # posted.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
